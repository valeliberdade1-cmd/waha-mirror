name: Mirror WAHA Plus

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Login WAHA source
        run: docker login -u devlikeapro -p ${{ secrets.WAHA_TOKEN }}

      - name: Pull WAHA Plus NOWEB
        run: docker pull devlikeapro/waha-plus:noweb-latest

      - name: Login Docker Hub
        run: docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Tag and Push
        run: |
          docker tag devlikeapro/waha-plus:noweb-latest gabootay/waha-plus:noweb-latest
          docker push gabootay/waha-plus:noweb-latest
